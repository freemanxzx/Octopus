<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Octopus MD Sync</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      min-height: 200px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      color: #e2e8f0;
      padding: 20px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }
    .header img { width: 32px; height: 32px; border-radius: 8px; }
    .header h1 { font-size: 16px; font-weight: 700; color: #f1f5f9; }
    .header span { font-size: 11px; color: #64748b; }
    .status {
      background: rgba(16, 185, 129, 0.1);
      border: 1px solid rgba(16, 185, 129, 0.3);
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 12px;
      font-size: 13px;
      color: #6ee7b7;
    }
    .status::before { content: '● '; color: #10b981; }
    .platforms {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 6px;
      margin-bottom: 12px;
    }
    .platforms span {
      text-align: center;
      font-size: 10px;
      color: #94a3b8;
      background: rgba(255,255,255,0.05);
      border-radius: 4px;
      padding: 6px 2px;
    }
    .footer {
      font-size: 11px;
      color: #475569;
      text-align: center;
      border-top: 1px solid rgba(255,255,255,0.05);
      padding-top: 10px;
    }
    .footer a { color: #818cf8; text-decoration: none; }
  </style>
</head>
<body>
  <div class="header">
    <img src="icons/48.png" alt="Octopus MD">
    <div>
      <h1>Octopus MD Sync</h1>
      <span>v1.0.0 · 10 Platforms</span>
    </div>
  </div>
  <div class="status">引擎就绪 — 等待来自 Octopus MD 编辑器的同步指令</div>
  <div class="platforms">
    <span>微信</span>
    <span>知乎</span>
    <span>掘金</span>
    <span>CSDN</span>
    <span>微博</span>
    <span>X</span>
    <span>博客园</span>
    <span>思否</span>
    <span>51CTO</span>
    <span>OSC</span>
  </div>
  <div class="footer">
    由 <a href="https://octopus.md" target="_blank">Octopus MD</a> 驱动
  </div>
</body>
</html>
