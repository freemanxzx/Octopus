<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;600;700;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: {{WIDTH}}px; height: {{HEIGHT}}px;
    font-family: 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    overflow: hidden;
  }
  .poster {
    width: 100%; height: 100%;
    background: linear-gradient(180deg, #fef9ef 0%, #fdf2e9 50%, #fce8d5 100%);
    display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    padding: 55px 45px; position: relative;
  }
  .content { position: relative; z-index: 1; text-align: center; width: 100%; }
  .emoji-badge {
    font-size: 50px; margin-bottom: 15px;
    filter: drop-shadow(0 4px 8px rgba(0,0,0,0.08));
  }
  .title {
    font-size: 44px; font-weight: 900; color: #2d2d2d;
    line-height: 1.3; margin-bottom: 8px;
  }
  .subtitle {
    font-size: 18px; color: #888;
    margin-bottom: 30px; font-weight: 400;
  }
  .points {
    text-align: left; max-width: 90%; margin: 0 auto;
    display: flex; flex-direction: column; gap: 10px;
  }
  .point {
    background: #fff; border-radius: 14px;
    padding: 16px 20px; font-size: 18px; color: #333;
    display: flex; align-items: flex-start; gap: 10px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.04);
    border: 1px solid rgba(0,0,0,0.04);
    line-height: 1.5;
  }
  .point-icon { font-size: 18px; flex-shrink: 0; margin-top: 2px; }
  .footer {
    margin-top: 30px; font-size: 14px;
    color: #bbb; letter-spacing: 2px;
  }
  .bg-circle {
    position: absolute; border-radius: 50%; z-index: 0;
  }
  .bg1 { width: 200px; height: 200px; top: -60px; right: -40px; background: rgba(255,182,130,0.15); }
  .bg2 { width: 150px; height: 150px; bottom: -30px; left: -30px; background: rgba(255,130,130,0.1); }
  .bg3 { width: 100px; height: 100px; top: 40%; left: -20px; background: rgba(130,200,255,0.1); }
</style>
</head>
<body>
<div class="poster">
  <div class="bg-circle bg1"></div>
  <div class="bg-circle bg2"></div>
  <div class="bg-circle bg3"></div>
  <div class="content">
    <div class="emoji-badge">{{EMOJI}}</div>
    <div class="title">{{TITLE}}</div>
    <div class="subtitle">{{SUBTITLE}}</div>
    <div class="points">
      {{POINTS}}
    </div>
    <div class="footer">{{FOOTER}}</div>
  </div>
</div>
</body>
</html>
