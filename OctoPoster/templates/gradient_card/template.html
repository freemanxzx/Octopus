<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;600;700;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: {{WIDTH}}px; height: {{HEIGHT}}px;
    font-family: 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    overflow: hidden;
  }
  .poster {
    width: 100%; height: 100%;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
    display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    padding: 60px 50px; position: relative;
  }
  .poster::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    background: radial-gradient(circle at 20% 80%, rgba(255,255,255,0.15), transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(255,255,255,0.1), transparent 50%);
  }
  .content { position: relative; z-index: 1; text-align: center; width: 100%; }
  .title {
    font-size: 52px; font-weight: 900; color: #fff;
    line-height: 1.3; margin-bottom: 20px;
    text-shadow: 0 2px 20px rgba(0,0,0,0.15);
  }
  .subtitle {
    font-size: 22px; color: rgba(255,255,255,0.9);
    margin-bottom: 40px; font-weight: 400;
    letter-spacing: 1px;
  }
  .points {
    text-align: left; max-width: 85%; margin: 0 auto;
    background: rgba(255,255,255,0.12); backdrop-filter: blur(10px);
    border-radius: 20px; padding: 30px 35px;
    border: 1px solid rgba(255,255,255,0.2);
  }
  .point {
    color: #fff; font-size: 20px; line-height: 1.6;
    padding: 8px 0; display: flex; align-items: flex-start; gap: 10px;
  }
  .point-icon { font-size: 18px; flex-shrink: 0; margin-top: 4px; }
  .footer {
    margin-top: 40px; font-size: 16px;
    color: rgba(255,255,255,0.7);
    letter-spacing: 2px;
  }
  .decorative-circle {
    position: absolute; border-radius: 50%;
    background: rgba(255,255,255,0.06);
  }
  .dc1 { width: 300px; height: 300px; top: -80px; right: -80px; }
  .dc2 { width: 200px; height: 200px; bottom: -50px; left: -50px; }
</style>
</head>
<body>
<div class="poster">
  <div class="decorative-circle dc1"></div>
  <div class="decorative-circle dc2"></div>
  <div class="content">
    <div class="title">{{TITLE}}</div>
    <div class="subtitle">{{SUBTITLE}}</div>
    <div class="points">
      {{POINTS}}
    </div>
    <div class="footer">{{FOOTER}}</div>
  </div>
</div>
</body>
</html>
