<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;600;700;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: {{WIDTH}}px; height: {{HEIGHT}}px;
    font-family: 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    overflow: hidden;
  }
  .poster {
    width: 100%; height: 100%;
    background: linear-gradient(160deg, #0f0c29 0%, #1a1a3e 40%, #24243e 100%);
    display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    padding: 60px 50px; position: relative;
  }
  .gold-line {
    width: 80px; height: 3px;
    background: linear-gradient(90deg, #d4a853, #f0d68a, #d4a853);
    margin: 20px auto;
    border-radius: 2px;
  }
  .content { position: relative; z-index: 1; text-align: center; width: 100%; }
  .title {
    font-size: 48px; font-weight: 900;
    background: linear-gradient(135deg, #f0d68a 0%, #d4a853 50%, #f0d68a 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    line-height: 1.3; margin-bottom: 5px;
  }
  .subtitle {
    font-size: 20px; color: rgba(212,168,83,0.7);
    margin-bottom: 10px; font-weight: 400;
    letter-spacing: 3px; text-transform: uppercase;
  }
  .points {
    text-align: left; max-width: 88%; margin: 30px auto 0;
  }
  .point {
    color: rgba(255,255,255,0.88); font-size: 19px; line-height: 1.5;
    padding: 12px 20px; display: flex; align-items: flex-start; gap: 12px;
    border-bottom: 1px solid rgba(212,168,83,0.12);
  }
  .point:last-child { border-bottom: none; }
  .point-num {
    color: #d4a853; font-weight: 700; font-size: 22px;
    flex-shrink: 0; min-width: 28px; text-align: center;
  }
  .footer {
    margin-top: 35px; font-size: 14px;
    color: rgba(212,168,83,0.5);
    letter-spacing: 3px;
  }
  .corner-deco {
    position: absolute; width: 50px; height: 50px;
    border: 2px solid rgba(212,168,83,0.25);
  }
  .cd-tl { top: 30px; left: 30px; border-right: none; border-bottom: none; }
  .cd-tr { top: 30px; right: 30px; border-left: none; border-bottom: none; }
  .cd-bl { bottom: 30px; left: 30px; border-right: none; border-top: none; }
  .cd-br { bottom: 30px; right: 30px; border-left: none; border-top: none; }
</style>
</head>
<body>
<div class="poster">
  <div class="corner-deco cd-tl"></div>
  <div class="corner-deco cd-tr"></div>
  <div class="corner-deco cd-bl"></div>
  <div class="corner-deco cd-br"></div>
  <div class="content">
    <div class="subtitle">{{SUBTITLE}}</div>
    <div class="title">{{TITLE}}</div>
    <div class="gold-line"></div>
    <div class="points">
      {{POINTS}}
    </div>
    <div class="footer">{{FOOTER}}</div>
  </div>
</div>
</body>
</html>
